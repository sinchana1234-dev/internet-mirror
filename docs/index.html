<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Internet Mirror</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>The Internet Mirror</h1>
  <p>Paste some of your comments/posts below — one per line — and watch your avatar react.</p>

  <textarea id="text-input" placeholder="Paste your comments here, one per line..."></textarea>
  <button id="analyze-btn">Analyze</button>
  <p id="status-text"></p>

  <div id="canvas-container"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
